<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=900, initial-scale=1.0" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap');
  * { box-sizing: border-box; }
  html, body { margin: 0; width: 900px; height: 1200px; background: #020817; font-family: 'Inter', sans-serif; color: #ffffff; overflow: hidden; display: flex; justify-content: center; align-items: center; }
  .report { width: 820px; min-height: 1120px; padding: 36px; border-radius: 42px; background: radial-gradient(circle at top left, rgba(56,189,248,.18), transparent 35%), linear-gradient(180deg, #06111f 0%, #020817 100%); border: 2px solid rgba(56,189,248,.35); box-shadow: 0 0 55px rgba(14,165,233,.25); }
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 34px; }
  .brand { display: flex; gap: 18px; align-items: center; }
  .logo { font-size: 46px; }
  .title h1 { margin: 0; font-size: 42px; font-weight: 800; letter-spacing: 1px; }
  .title h2 { margin: 6px 0 0; font-size: 48px; color: #38bdf8; font-weight: 800; }
  .date-box { text-align: right; color: #dbeafe; font-size: 24px; line-height: 1.6; }
  .card { background: rgba(15, 23, 42, .82); border: 1px solid rgba(56,189,248,.25); border-radius: 26px; padding: 28px; margin-bottom: 24px; }
  .symbol-card { display: flex; align-items: center; justify-content: space-between; }
  .label { color: #94a3b8; font-size: 20px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
  .symbol { font-size: 58px; font-weight: 800; margin-top: 6px; }
  .instrument { text-align: right; }
  .instrument .name { color: #38bdf8; font-size: 25px; font-weight: 700; }
  .instrument .desc { color: #cbd5e1; font-size: 21px; margin-top: 8px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
  .metric { text-align: center; padding: 26px; background: rgba(2, 8, 23, .42); border-radius: 24px; }
  .metric-title { color: #94a3b8; font-size: 21px; font-weight: 800; text-transform: uppercase; }
  .metric-value { font-size: 48px; font-weight: 800; margin-top: 10px; }
  .green { color: #4ade80; } .red { color: #f87171; }
  .bias-card { display: flex; align-items: center; justify-content: space-between; border-color: rgba(250,204,21,.35); background: linear-gradient(90deg, rgba(250,204,21,.12), rgba(15,23,42,.85)); }
  .bias-left { display: flex; align-items: center; gap: 20px; }
  .bias-icon { font-size: 44px; }
  .bias-title { font-size: 22px; color: #facc15; font-weight: 800; }
  .bias-value { font-size: 44px; font-weight: 800; margin-top: 4px; }
  .footer { margin-top: 30px; padding: 24px; border-radius: 24px; background: rgba(14,165,233,.10); border: 1px solid rgba(56,189,248,.30); display: flex; justify-content: space-between; align-items: center; }
  .generated { color: #cbd5e1; font-size: 20px; line-height: 1.5; }
  .footer-brand { text-align: right; }
  .footer-brand strong { color: #38bdf8; font-size: 24px; }
</style>
</head>
<body>
<div class="report">
  <div class="header">
    <div class="brand">
      <div class="logo">📊</div>
      <div class="title">
        <h1>MGT SPX AI</h1>
        <h2>DAILY REPORT</h2>
      </div>
    </div>
    <div class="date-box">
      <div id="report-date"></div>
      <div id="report-time"></div>
    </div>
  </div>

  <div class="card symbol-card">
    <div><div class="label">Symbol</div><div id="symbol" class="symbol"></div></div>
    <div class="instrument"><div class="name" id="instrument-name"></div><div class="desc" id="instrument-desc"></div></div>
  </div>

  <div class="card grid-2">
    <div class="metric"><div class="metric-title">Open</div><div id="open" class="metric-value"></div></div>
    <div class="metric"><div class="metric-title">Close</div><div id="close" class="metric-value"></div></div>
  </div>

  <div class="card grid-2">
    <div class="metric"><div class="metric-title green">High</div><div id="high" class="metric-value green"></div></div>
    <div class="metric"><div class="metric-title red">Low</div><div id="low" class="metric-value red"></div></div>
  </div>

  <div class="card grid-2">
    <div class="metric"><div class="metric-title">Change</div><div id="change" class="metric-value"></div></div>
    <div class="metric"><div class="metric-title">Change %</div><div id="changePct" class="metric-value"></div></div>
  </div>

  <div class="card bias-card">
    <div class="bias-left"><div id="bias-icon" class="bias-icon"></div><div><div class="bias-title">MARKET BIAS</div><div id="market-bias" class="bias-value"></div></div></div>
    <div style="font-size:54px;">⚖️</div>
  </div>

  <div class="footer">
    <div class="generated"><strong>Generated:</strong><br><span id="generated"></span></div>
    <div class="footer-brand"><strong>MGT SPX AI</strong><div>Smart Data. Smarter Decisions.</div></div>
  </div>
</div>

<script>
const p = new URLSearchParams(window.location.search);
const set = (id, val) => { if(document.getElementById(id)) document.getElementById(id).innerText = val || "-"; };

set("symbol", p.get("symbol"));
set("instrument-name", p.get("name"));
set("instrument-desc", p.get("desc"));
set("open", p.get("open"));
set("close", p.get("close"));
set("high", p.get("high"));
set("low", p.get("low"));
set("report-date", p.get("date"));
set("report-time", p.get("time"));
set("generated", `${p.get("date")}, ${p.get("time")}`);

const chg = parseFloat(p.get("change"));
const chgPct = parseFloat(p.get("changePct"));

document.getElementById("change").innerText = (chg >= 0 ? "+" : "") + chg;
document.getElementById("changePct").innerText = (chgPct >= 0 ? "+" : "") + chgPct + "%";
document.getElementById("change").className = "metric-value " + (chg >= 0 ? "green" : "red");
document.getElementById("changePct").className = "metric-value " + (chg >= 0 ? "green" : "red");

const bias = p.get("bias") || "NEUTRAL";
document.getElementById("market-bias").innerText = bias.toUpperCase();
document.getElementById("bias-icon").innerText = bias.toLowerCase().includes("bull") ? "🟢" : (bias.toLowerCase().includes("bear") ? "🔴" : "🟡");
</script>
</body>
</html>
